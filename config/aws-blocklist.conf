# ── AWS CLI sandbox blocklist ─────────────────────────────────────────────────
# One pattern per line. Lines starting with # and blank lines are ignored.
# Patterns are matched as substrings against POSITIONAL[1] (the subcommand).
#
# NOTE: parameter values (e.g. --filters "Name=tag:env,Values=delete-me") are
# NOT checked — the wrapper only inspects the subcommand position, so filter
# values, resource names and tag values are safe.
#
# NOTE: the following s3 high-level subcommands are always blocked regardless
# of this list (handled as special cases in the wrapper): rm, rb, mv.
# "s3 sync --delete" is also always blocked.

# ── Deletion / destruction ────────────────────────────────────────────────────
delete-
terminate-
destroy
purge

# ── Removal ───────────────────────────────────────────────────────────────────
remove-
deregister-
disassociate-

# ── Revocation / release ──────────────────────────────────────────────────────
revoke-
release-

# ── Detachment ────────────────────────────────────────────────────────────────
detach-

# ── Disablement ───────────────────────────────────────────────────────────────
disable-
deactivate-

# ── Instance stop (disruptive even if reversible) ─────────────────────────────
stop-
