# ── Azure CLI sandbox blocklist ───────────────────────────────────────────────
# One pattern per line. Lines starting with # and blank lines are ignored.
# Patterns are matched as substrings against the first 3 positional args
# (command group + optional subgroup + subcommand).
#
# NOTE: flag values (e.g. --tags "env=delete-me") are NOT checked here —
# the wrapper only inspects positional args, so tag values are safe.
#
# NOTE: "az rest --method DELETE" is always blocked regardless of this list
# (it is handled as a special case in the wrapper script itself).

# ── Deletion ──────────────────────────────────────────────────────────────────
delete
purge

# ── Removal ───────────────────────────────────────────────────────────────────
remove

# ── Compute: stop / deallocate (disruptive even if reversible) ────────────────
deallocate
